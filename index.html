<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Butterchurn renders to this canvas, Three.js uses it as a texture */
    #milkdrop-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Three.js canvas for VR mode */
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: none;
    }

    /* Controls overlay */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    button:hover { background: rgba(255, 255, 255, 0.15); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #preset-name {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 16px;
      opacity: 0.7;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      font-size: 18px;
      opacity: 0.8;
    }
    #status.hidden { display: none; }

    /* Drop zone for audio files */
    #drop-zone {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      border: 3px dashed rgba(255, 255, 255, 0.4);
      font-size: 24px;
    }
    #drop-zone.active { display: flex; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="milkdrop-canvas"></canvas>
    <canvas id="three-canvas"></canvas>

    <div id="preset-name"></div>

    <div id="status">
      <p>Choose an audio source to start</p>
    </div>

    <div id="controls">
      <button id="btn-file">Open Audio File</button>
      <button id="btn-tab">Capture Browser Tab</button>
      <button id="btn-mic">Use Microphone</button>
      <button id="btn-preset-prev" disabled>&larr;</button>
      <button id="btn-preset-next" disabled>Next Preset &rarr;</button>
      <button id="btn-vr" style="display:none">Enter VR</button>
    </div>

    <div id="drop-zone">Drop audio file here</div>

    <!-- Debug overlay — visible on flat screen for diagnosing VR issues -->
    <div id="debug-log" style="
      position: absolute; top: 10px; left: 10px; z-index: 100;
      background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace;
      font-size: 12px; padding: 10px; max-width: 500px; max-height: 300px;
      overflow-y: auto; border-radius: 4px; pointer-events: none;
      display: none;
    "></div>

    <input type="file" id="file-input" accept="audio/*" style="display:none" />
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
